<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>敬拜團服事排班系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/x-data-spreadsheet@1.1.5/dist/xspreadsheet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <style>
    body { background-color: #f8f9fa; }
    .tab-content { display: none; padding-top: 20px; }
    .tab-content.active { display: block; }
    
    /* 公佈欄樣式 */
    #dashboardTable table th, #dashboardTable table td { text-align: center; vertical-align: middle; white-space: nowrap; }
    .warning-row { background-color: #fff3cd !important; border-left: 5px solid #ffc107; }
    
    /* 預覽表格優化樣式 */
    .preview-table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #dee2e6; }
    .preview-table th { background-color: #212529; color: white; text-align: center; font-weight: 500; padding: 12px; }
    .preview-table td { vertical-align: middle; text-align: center; padding: 8px 12px; }
    .preview-table .form-select { border: 1px solid #ced4da; transition: all 0.2s; cursor: pointer; }
    .preview-table .form-select:hover { border-color: #0d6efd; }
    .select-danger { background-color: #ffe6e6 !important; border-color: #dc3545 !important; color: #dc3545 !important; font-weight: bold; }
  </style>
</head>
<body>

<div class="container mt-4 mb-5 bg-white p-4 rounded-4 shadow-sm">
  <h2 class="mb-4">敬拜團服事排班系統 <span class="badge bg-primary fs-6">Pro</span></h2>
  
  <ul class="nav nav-tabs" id="myTab">
    <li class="nav-item"><a class="nav-link active fw-bold" href="#" onclick="switchTab('dashboard')">公佈欄</a></li>
    <li class="nav-item"><a class="nav-link fw-bold" href="#" onclick="switchTab('settings')">位置設定與人員</a></li>
    <li class="nav-item"><a class="nav-link fw-bold" href="#" onclick="switchTab('schedule')">服事安排</a></li>
    <li class="nav-item"><a class="nav-link fw-bold" href="#" onclick="switchTab('sermon')">牧師與題目設定</a></li>
  </ul>

  <div id="dashboard" class="tab-content active">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>公佈欄</h4>
      <div class="d-flex align-items-center">
        <label class="form-label me-2 mb-0 fw-bold">選擇季度：</label>
        <select id="quarterSelect" class="form-select w-auto" onchange="loadDashboard()">
          <option value="2026-Q1" selected>2026-Q1</option>
          <option value="2026-Q2">2026-Q2</option>
          <option value="2026-Q3">2026-Q3</option>
          <option value="2026-Q4">2026-Q4</option>
        </select>
      </div>
    </div>
    <div class="alert alert-light border">
      💡 系統會自動抓取已發布的班表。若出現 <span class="badge bg-warning text-dark">⚠️ 警告</span> 標記，代表排班有違規情況。
    </div>
    <div id="dashboardTable">
      <div class="text-center text-muted my-5">請選擇季度以載入資料...</div>
    </div> 
  </div>

  <div id="settings" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>位置設定與人員</h4>
      <button class="btn btn-primary" onclick="savePositionsToServer()">儲存設定</button>
    </div>
    <table class="table table-bordered table-hover">
      <thead class="table-light">
        <tr>
          <th style="width: 5%; text-align: center;">↕️</th> 
          <th style="width: 20%">位置名稱 (如: 主領)</th>
          <th style="width: 50%">人員名單</th>
          <th style="width: 15%">是否必排</th>
          <th style="width: 10%; text-align: center;">操作</th>
        </tr>
      </thead>
      <tbody id="positionsTbody"></tbody>
    </table>
    <button class="btn btn-outline-secondary w-100" onclick="addPositionRow('', '')">+ 新增一個位置</button>
  </div>

  <div id="schedule" class="tab-content">
    <div class="row">
      <div class="col-md-3 border-end">
        <h5 class="mb-3 text-primary">1. 產生全新排班</h5>
        <div class="mb-3 p-2 bg-light border rounded">
          <label class="form-label fw-bold">挑選排班日期：</label>
          <input type="text" id="multiDatePicker" class="form-control mb-2 bg-white" placeholder="點此打開日曆多選...">
          <button class="btn btn-primary w-100" onclick="addSelectedDates()">確認新增日期</button>
        </div>
        <div id="dateSettingsContainer" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="btn btn-primary w-100 mt-2 mb-4 fw-bold" onclick="generateSchedule()">產生排班預覽 🚀</button>
        <hr>
        <h5 class="mb-3 text-success">2. 讀取現有排班</h5>
        <div class="p-2 border border-success border-opacity-50 rounded bg-success bg-opacity-10">
          <input type="date" id="editStartDate" class="form-control form-control-sm mb-1">
          <input type="date" id="editEndDate" class="form-control form-control-sm mb-2">
          <button class="btn btn-success w-100 fw-bold" onclick="loadExistingSchedule()">讀取資料 📥</button>
        </div>
      </div>

      <div class="col-md-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0 text-primary">排班預覽 (可直接點擊下拉選單修改)</h5>
          <button class="btn btn-success fw-bold px-4" id="saveScheduleBtn" onclick="saveGeneratedSchedule()" style="display: none;">儲存至資料庫</button>
        </div>
        
        <div class="preview-table-container" id="previewContainer" style="display: none;">
          <div class="table-responsive">
            <table class="table table-hover mb-0 preview-table" id="previewTable">
              <thead id="previewThead"></thead>
              <tbody id="previewTbody"></tbody>
            </table>
          </div>
        </div>
        
        <div id="previewPlaceholder" class="text-center text-muted mt-5 p-5 bg-light rounded border">
          <h5 class="text-secondary">請先在左側點擊「產生排班預覽」或「讀取資料」</h5>
        </div>
      </div>
    </div>
  </div>

  <div id="sermon" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>牧師與題目與經文設定</h4>
      <button class="btn btn-success" onclick="saveSermonData()">儲存至資料庫</button>
    </div>
    <div id="x-spreadsheet-demo"></div>
  </div>
</div>

<script src="https://unpkg.com/x-data-spreadsheet@1.1.5/dist/xspreadsheet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script> 
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyk_6tUucVg-U4rRQjYHvk632teZyxufDkNX_X1WRUXPMGgsTaemVXD_mv9kBDjuSwOnA/exec';

  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelector(`a[onclick="switchTab('${tabId}')"]`).classList.add('active');
    
    if(tabId === 'dashboard') loadDashboard();
    if(tabId === 'settings') loadPositions();
    if(tabId === 'schedule') initScheduleTab();
    if(tabId === 'sermon' && !window.xs) initSpreadsheet();
  }

  window.onload = () => loadDashboard();

  async function callAPI(action, payload) {
    const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, ...payload }) });
    return await response.json();
  }

  // ==========================================
  // 1. 公佈欄邏輯
  // ==========================================
  async function loadDashboard() {
    const container = document.getElementById('dashboardTable');
    container.innerHTML = '<div class="text-center text-muted my-5"><h5>正在載入最新班表...</h5><div class="spinner-border text-primary mt-2"></div></div>';
    const [year, quarter] = document.getElementById('quarterSelect').value.split('-');

    try {
      const result = await callAPI('getSchedule', { year, quarter });
      if (result.status === 'success') renderDashboardTable(result.data);
      else container.innerHTML = `<div class="alert alert-danger">載入失敗：${result.message}</div>`;
    } catch (error) {
      container.innerHTML = `<div class="alert alert-danger">網路連線錯誤！</div>`;
    }
  }

  function renderDashboardTable(data) {
    const container = document.getElementById('dashboardTable');
    container.innerHTML = '';
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="alert alert-warning text-center my-4">該季度目前沒有資料。</div>';
      return;
    }

    let ignoreKeys = ['hasWarning', 'warningMessage', '年度', '季度'];
    let headers = Object.keys(data[0]).filter(k => !ignoreKeys.includes(k));

    let table = document.createElement('table');
    table.className = 'table table-bordered table-hover align-middle shadow-sm bg-white';
    table.style.fontSize = '0.9em';

    let thead = document.createElement('thead');
    thead.className = 'table-dark';
    let trHead = document.createElement('tr');
    headers.forEach(h => { let th = document.createElement('th'); th.innerText = h; trHead.appendChild(th); });
    thead.appendChild(trHead);
    table.appendChild(thead);

    let tbody = document.createElement('tbody');
    data.forEach(row => {
      let tr = document.createElement('tr');
      if (row.hasWarning) tr.classList.add('warning-row');

      headers.forEach(h => {
        let td = document.createElement('td');
        let cellText = row[h] || '';
        if (h === '日期' && row.hasWarning) {
          td.innerHTML = `<strong>${cellText}</strong><br><span class="badge bg-warning text-dark mt-1 text-wrap">${row.warningMessage}</span>`;
        } else {
          td.innerText = cellText;
          if(cellText === '' || cellText === '【待定】') td.classList.add('text-muted');
          if(cellText === '【待定】') td.style.color = '#dc3545';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    let responsiveDiv = document.createElement('div');
    responsiveDiv.className = 'table-responsive';
    responsiveDiv.appendChild(table);
    container.appendChild(responsiveDiv);
  }

  // ==========================================
  // 2. 位置設定邏輯
  // ==========================================
  let sortablePositions = null; 

  async function loadPositions() {
    const tbody = document.getElementById('positionsTbody');
    const result = await callAPI('getPositions', {});
    tbody.innerHTML = ''; 
    if (result.status === 'success') {
      if(result.data.length === 0) addPositionRow('主領', '', '是');
      else result.data.forEach(item => addPositionRow(item.positionName, item.personnel, item.isRequired || '是'));
      
      if (sortablePositions) sortablePositions.destroy();
      sortablePositions = new Sortable(tbody, { handle: '.drag-handle', animation: 150, ghostClass: 'bg-light' });
    }
  }

  function addPositionRow(posName, personnel, isRequired = "是") {
    const tbody = document.getElementById('positionsTbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="text-center align-middle drag-handle" style="cursor: grab; font-size: 1.2em; color: #888;">☰</td>
      <td><input type="text" class="form-control pos-name" value="${posName}"></td>
      <td><input type="text" class="form-control pos-personnel" value="${personnel}"></td>
      <td>
        <select class="form-select pos-required">
          <option value="是" ${isRequired === "是" ? "selected" : ""}>必排</option>
          <option value="否" ${isRequired === "否" ? "selected" : ""}>非必排</option>
        </select>
      </td>
      <td class="text-center align-middle"><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">刪除</button></td>
    `;
    tbody.appendChild(tr);
  }

  async function savePositionsToServer() {
    const rows = document.querySelectorAll('#positionsTbody tr');
    let positionsData = [];
    rows.forEach(tr => {
      const nameInput = tr.querySelector('.pos-name').value.trim();
      const personnelInput = tr.querySelector('.pos-personnel').value.trim();
      const reqInput = tr.querySelector('.pos-required').value;
      if (nameInput !== '') positionsData.push({ positionName: nameInput, personnel: personnelInput, isRequired: reqInput });
    });

    const saveBtn = event.target;
    saveBtn.disabled = true; saveBtn.innerText = "儲存中...";
    await callAPI('savePositions', { positionsData });
    alert("設定已成功儲存！");
    saveBtn.disabled = false; saveBtn.innerText = "儲存設定";
  }

  // ==========================================
  // 3. 服事安排 (全新視覺化下拉選單版)
  // ==========================================
  let currentPositions = []; 
  let generatedScheduleData = []; 
  let fpInstance = null; 

  async function initScheduleTab() {
    if (!fpInstance) fpInstance = flatpickr("#multiDatePicker", { mode: "multiple", dateFormat: "Y-m-d", locale: "zh" });
    const result = await callAPI('getPositions', {});
    if (result.status === 'success') currentPositions = result.data;
  }

  function addSelectedDates() {
    if (!fpInstance || fpInstance.selectedDates.length === 0) return;
    const selectedDates = fpInstance.selectedDates.sort((a, b) => a - b);
    selectedDates.forEach(dateObj => {
      const dateString = flatpickr.formatDate(dateObj, "Y-m-d");
      const div = document.createElement('div');
      div.className = 'card mb-2 p-2 border-primary border-opacity-25 shadow-sm';
      div.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-1">
          <input type="date" class="form-control form-control-sm s-date w-50 me-1" value="${dateString}" required>
          <input type="text" class="form-control form-control-sm s-type w-50 text-primary fw-bold" value="主日" placeholder="聚會類別">
          <button class="btn btn-sm btn-outline-danger ms-1" onclick="this.closest('.card').remove()">x</button>
        </div>
        <input type="text" class="form-control form-control-sm s-leave" placeholder="請假人員 (如: 王小明,李大華)">
      `;
      document.getElementById('dateSettingsContainer').appendChild(div);
    });
    fpInstance.clear();
  }

  function getQuarter(dateString) {
    const q = Math.floor((new Date(dateString).getMonth() + 3) / 3);
    return `Q${q}`;
  }

  function generateSchedule() {
    if (currentPositions.length === 0) { alert("請先建立位置資料！"); return; }
    const rows = document.querySelectorAll('.schedule-date-row, #dateSettingsContainer .card');
    let inputConditions = [];
    rows.forEach(row => {
      const dateVal = row.querySelector('.s-date').value;
      if (dateVal) {
        inputConditions.push({
          date: dateVal, type: row.querySelector('.s-type').value,
          leaves: row.querySelector('.s-leave').value.split(',').map(s=>s.trim()).filter(s=>s) 
        });
      }
    });

    if (inputConditions.length === 0) { alert("請設定日期！"); return; }
    inputConditions.sort((a, b) => a.date.localeCompare(b.date));

    let leaderObj = currentPositions.find(p => p.positionName === '主領');
    let leaderMasterList = leaderObj ? leaderObj.personnel.split(',').map(s=>s.trim()).filter(s=>s) : [];
    let leaderPool = []; 
    let consecutiveCount = {}; 
    currentPositions.forEach(p => { consecutiveCount[p.positionName] = {}; });
    
    let previousLeader = null; 
    generatedScheduleData = [];

    inputConditions.forEach(dayInfo => {
      let dailyRecord = { '年度': dayInfo.date.substring(0,4), '季度': getQuarter(dayInfo.date), '日期': dayInfo.date, '聚會類別': dayInfo.type };
      let assignedToday = []; 

      currentPositions.forEach(posObj => {
        let posName = posObj.positionName;
        let candidates = posObj.personnel.split(',').map(s=>s.trim()).filter(s=>s);
        let isReq = posObj.isRequired || '是';
        let selectedPerson = "";

        if (posName === '主領') {
          if (leaderPool.length === 0) leaderPool = [...leaderMasterList];
          let validLeaders = leaderPool.filter(p => !dayInfo.leaves.includes(p) && p !== previousLeader);
          if (validLeaders.length > 0) {
            selectedPerson = validLeaders[Math.floor(Math.random() * validLeaders.length)];
            leaderPool = leaderPool.filter(p => p !== selectedPerson); 
          }
        } else {
          let validCandidates = candidates.filter(p => !dayInfo.leaves.includes(p) && !assignedToday.includes(p) && (consecutiveCount[posName][p]||0)<2);
          if (validCandidates.length > 0) selectedPerson = validCandidates[Math.floor(Math.random() * validCandidates.length)];
        }

        if (selectedPerson === "" && isReq === "是") selectedPerson = "【待定】"; 
        
        dailyRecord[posName] = selectedPerson;
        if (selectedPerson && selectedPerson !== "【待定】") assignedToday.push(selectedPerson);

        candidates.forEach(person => {
          if (person === selectedPerson) consecutiveCount[posName][person] = (consecutiveCount[posName][person] || 0) + 1;
          else consecutiveCount[posName][person] = 0;
        });
      }); 
      previousLeader = dailyRecord['主領'];
      generatedScheduleData.push(dailyRecord);
    }); 
    renderPreviewTable(generatedScheduleData);
  }

  async function loadExistingSchedule() {
    const startDate = document.getElementById('editStartDate').value;
    const endDate = document.getElementById('editEndDate').value;
    if (!startDate || !endDate) { alert("請選擇日期區間！"); return; }
    
    const btn = event.target;
    btn.disabled = true; btn.innerText = "讀取中...";

    const result = await callAPI('getScheduleByDateRange', { startDate, endDate });
    if (result.status === 'success') {
      if (result.data.length === 0) alert("區間內無排班資料。");
      else {
        generatedScheduleData = result.data; // 綁定到全域變數，供存檔使用
        renderPreviewTable(generatedScheduleData);
        alert(`✅ 讀取了 ${result.data.length} 天的排班資料！`);
      }
    } else alert("讀取失敗：" + result.message);
    
    btn.disabled = false; btn.innerText = "讀取資料 📥";
  }

  // --- HTML 預覽表格與下拉選單渲染 ---
  function renderPreviewTable(data) {
    const container = document.getElementById('previewContainer');
    const thead = document.getElementById('previewThead');
    const tbody = document.getElementById('previewTbody');
    const placeholder = document.getElementById('previewPlaceholder');
    const saveBtn = document.getElementById('saveScheduleBtn');

    thead.innerHTML = ''; tbody.innerHTML = '';

    // 產生表頭
    let headers = ['日期', '聚會類別', ...currentPositions.map(p => p.positionName)];
    let trHead = document.createElement('tr');
    headers.forEach(h => {
      let th = document.createElement('th');
      th.innerText = h;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);

    // 產生內容列與下拉選單
    data.forEach((row, rowIndex) => {
      let tr = document.createElement('tr');
      
      headers.forEach(h => {
        let td = document.createElement('td');
        
        if (h === '日期') {
          td.innerHTML = `<span class="badge bg-secondary fs-6 shadow-sm">${row[h]}</span>`;
        } 
        else if (h === '聚會類別') {
          // 聚會類別使用文字輸入框
          let input = document.createElement('input');
          input.type = 'text';
          input.className = 'form-control form-control-sm text-center border-0 bg-light';
          input.value = row[h] || '';
          input.onchange = (e) => { generatedScheduleData[rowIndex][h] = e.target.value.trim(); };
          td.appendChild(input);
        } 
        else {
          // 動態產生位置的下拉選單
          let posDef = currentPositions.find(p => p.positionName === h);
          let candidates = posDef ? posDef.personnel.split(',').map(s=>s.trim()).filter(s=>s) : [];
          let isReq = posDef ? (posDef.isRequired || '是') : '是';

          let select = document.createElement('select');
          select.className = 'form-select form-select-sm text-center';
          
          // 如果是待定，套用紅色警告樣式
          if(row[h] === '【待定】') select.classList.add('select-danger');

          // 加入預設選項 (待定 或 空白)
          let optDefault = document.createElement('option');
          optDefault.value = (isReq === '是') ? '【待定】' : '';
          optDefault.text = (isReq === '是') ? '【待定】' : '無';
          select.appendChild(optDefault);

          // 加入候選人員名單
          candidates.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.text = c;
            if(row[h] === c) opt.selected = true;
            select.appendChild(opt);
          });

          // 當下拉選單改變時，同步更新背後的資料陣列，並切換顏色
          select.onchange = function() {
            generatedScheduleData[rowIndex][h] = this.value;
            if (this.value === '【待定】') {
              this.classList.add('select-danger');
            } else {
              this.classList.remove('select-danger');
            }
          };
          td.appendChild(select);
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    placeholder.style.display = 'none';
    container.style.display = 'block';
    saveBtn.style.display = 'inline-block';
  }

  // 因為 generatedScheduleData 會被下拉選單自動更新，存檔邏輯變得非常簡潔！
  async function saveGeneratedSchedule() {
    if (generatedScheduleData.length === 0) return;
    const btn = document.getElementById('saveScheduleBtn');
    btn.disabled = true; btn.innerText = '儲存中...';

    try {
      const result = await callAPI('saveSchedule', { scheduleData: generatedScheduleData });
      if (result.status === 'success') {
        alert("🎉 排班表已成功儲存！");
        switchTab('dashboard'); // 自動跳轉公佈欄
      } else alert("儲存失敗：" + result.message);
    } catch (error) {
      alert("網路連線錯誤！");
    } finally {
      btn.disabled = false; btn.innerText = '儲存至資料庫';
    }
  }

  // ==========================================
  // 4. 牧師設定邏輯
  // ==========================================
  async function initSpreadsheet() {
    window.xs = x_spreadsheet('#x-spreadsheet-demo', { showToolbar: true, showGrid: true, view: { height: () => 400, width: () => document.getElementById('sermon').clientWidth - 30 } });
    try {
      const result = await callAPI('getSermonInfo', {});
      let rowsData = { 0: { cells: { 0: {text: '日期'}, 1: {text: '牧師'}, 2: {text: '題目'}, 3: {text: '經文'} } } };
      if (result.status === 'success' && result.data.length > 0) {
        result.data.forEach((row, idx) => {
          rowsData[idx + 1] = { cells: { 0: { text: row['日期']||'' }, 1: { text: row['牧師']||'' }, 2: { text: row['題目']||'' }, 3: { text: row['經文']||'' } } };
        });
      }
      window.xs.loadData([{ name: '講員排程', rows: rowsData }]);
    } catch (e) { console.error(e); }
  }

  async function saveSermonData() {
    if (!window.xs) return;
    const data = window.xs.getData()[0].rows;
    let finalSermonData = [];
    const headers = ['日期', '牧師', '題目', '經文'];

    Object.keys(data).forEach(rowIndex => {
      if (rowIndex === '0' || rowIndex === 'len') return; 
      let rowObj = {}; let hasData = false;
      headers.forEach((h, colIndex) => {
        let text = (data[rowIndex].cells && data[rowIndex].cells[colIndex]) ? data[rowIndex].cells[colIndex].text : '';
        rowObj[h] = text;
        if (h === '日期' && text.trim() !== '') hasData = true;
      });
      if (hasData) finalSermonData.push(rowObj);
    });

    if (finalSermonData.length === 0) { alert("請填寫資料"); return; }
    try {
      const result = await callAPI('saveSermonInfo', { sermonData: finalSermonData });
      if (result.status === 'success') { alert("🎉 講員資訊儲存成功！"); loadDashboard(); }
    } catch (e) { alert("儲存失敗"); }
  }
</script>
</body>
</html>
