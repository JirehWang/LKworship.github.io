<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>敬拜團服事排班系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/x-data-spreadsheet@1.1.5/dist/xspreadsheet.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <style>
    .tab-content { display: none; padding-top: 20px; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<div class="container mt-4 mb-5">
  <h2 class="mb-4">敬拜團服事排班系統</h2>
  
  <ul class="nav nav-tabs" id="myTab">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('dashboard')">公佈欄</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('settings')">位置設定與人員</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('schedule')">服事安排</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('sermon')">牧師與題目與經文設定</a></li>
  </ul>

  <div id="dashboard" class="tab-content active">
    <h4>公佈欄</h4>
    <select id="quarterSelect" class="form-select w-25 mb-3">
      <option value="2026-Q1">2026-Q1</option>
      <option value="2026-Q2">2026-Q2</option>
    </select>
    <div id="dashboardTable"></div> 
  </div>

  <div id="settings" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>位置設定與人員</h4>
      <button class="btn btn-primary" onclick="savePositionsToServer()">儲存設定</button>
    </div>
    
    <div class="alert alert-info">
      💡 提示：請在下方設定各服事位置，對應的人員名單請以<strong>半形逗號 <code>,</code></strong> 分隔 (例如：王小明,李大華)。
    </div>

    <table class="table table-bordered table-hover">
      <thead class="table-light">
        <tr>
          <th style="width: 30%">位置名稱 (如: 主領)</th>
          <th style="width: 60%">人員名單</th>
          <th style="width: 10%; text-align: center;">操作</th>
        </tr>
      </thead>
      <tbody id="positionsTbody">
        </tbody>
    </table>
    
    <button class="btn btn-outline-secondary w-100" onclick="addPositionRow('', '')">
      + 新增一個位置
    </button>
  </div>

  <div id="schedule" class="tab-content">
    <div class="row">
      <div class="col-md-4 border-end">
        <h5 class="mb-3">1. 設定聚會條件</h5>
        
        <div class="mb-3 p-2 bg-light border rounded">
          <label class="form-label fw-bold text-primary">挑選排班日期：</label>
          <div class="input-group">
            <input type="text" id="multiDatePicker" class="form-control bg-white" placeholder="點此打開日曆多選...">
            <button class="btn btn-primary" onclick="addSelectedDates()">確認新增</button>
          </div>
          <small class="text-muted mt-1 d-block">提示：可在日曆上點擊多個日期。</small>
        </div>

        <div class="alert alert-secondary" style="font-size: 0.9em;">
          下方為已建立的日期。聚會預設為「主日」，可手動修改。若有人請假請填寫姓名。
        </div>
        
        <div id="dateSettingsContainer">
          </div>
        
        <button class="btn btn-success w-100 mt-3" onclick="generateSchedule()">產生排班預覽 🚀</button>
      </div>

      <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">2. 排班預覽 (可直接點擊修改)</h5>
          <button class="btn btn-success" id="saveScheduleBtn" onclick="saveGeneratedSchedule()" style="display: none;">儲存至資料庫</button>
        </div>
        
        <div class="table-responsive">
          <table class="table table-bordered table-sm" id="previewTable" style="display: none; font-size: 0.9em;">
            <thead class="table-light" id="previewThead">
              </thead>
            <tbody id="previewTbody">
              </tbody>
          </table>
          <div id="previewPlaceholder" class="text-center text-muted mt-5">
            請先在左側設定日期，並點擊「產生排班預覽」
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="sermon" class="tab-content">
    <h4>牧師與題目與經文設定</h4>
    <div id="x-spreadsheet-demo"></div>
    <button class="btn btn-success mt-3" onclick="saveSermonData()">儲存至資料庫</button>
  </div>
</div>

<script src="https://unpkg.com/x-data-spreadsheet@1.1.5/dist/xspreadsheet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>

<script>
  // 您的 GAS Web App URL
  const API_URL = 'https://script.google.com/macros/s/AKfycbyk_6tUucVg-U4rRQjYHvk632teZyxufDkNX_X1WRUXPMGgsTaemVXD_mv9kBDjuSwOnA/exec';

  // 分頁切換邏輯
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    // 正確讓上方頁籤也亮起來
    document.querySelector(`a[onclick="switchTab('${tabId}')"]`).classList.add('active');
    
    if(tabId === 'sermon' && !window.xs) {
      initSpreadsheet();
    }
    if(tabId === 'settings') {
      loadPositions();
    }
    if(tabId === 'schedule') {
      initScheduleTab();
    }
  }

  // 取得資料的通用 API 呼叫函數
  async function callAPI(action, payload) {
    const response = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: action, ...payload })
    });
    return await response.json();
  }

  // ==========================================
  // 位置設定與人員 (Settings Tab) 相關邏輯
  // ==========================================
  
  async function loadPositions() {
    const tbody = document.getElementById('positionsTbody');
    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">正在載入資料...</td></tr>';
    
    try {
      const result = await callAPI('getPositions', {});
      if (result.status === 'success') {
        renderPositions(result.data);
      } else {
        alert("載入失敗：" + result.message);
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">載入失敗，請重試</td></tr>';
      }
    } catch (error) {
      alert("網路錯誤或 API 異常！");
      tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">網路連線錯誤</td></tr>';
    }
  }

  function renderPositions(data) {
    const tbody = document.getElementById('positionsTbody');
    tbody.innerHTML = ''; 
    
    if (!data || data.length === 0) {
      addPositionRow('主領', '');
      return;
    }
    
    data.forEach(item => {
      addPositionRow(item.positionName, item.personnel);
    });
  }

  function addPositionRow(posName, personnel) {
    const tbody = document.getElementById('positionsTbody');
    const tr = document.createElement('tr');
    
    tr.innerHTML = `
      <td>
        <input type="text" class="form-control pos-name" value="${posName}" placeholder="例如：吉他">
      </td>
      <td>
        <input type="text" class="form-control pos-personnel" value="${personnel}" placeholder="例如：張三,李四">
      </td>
      <td class="text-center">
        <button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">刪除</button>
      </td>
    `;
    tbody.appendChild(tr);
  }

  async function savePositionsToServer() {
    const rows = document.querySelectorAll('#positionsTbody tr');
    let positionsData = [];
    
    rows.forEach(tr => {
      const nameInput = tr.querySelector('.pos-name');
      const personnelInput = tr.querySelector('.pos-personnel');
      
      if (nameInput && nameInput.value.trim() !== '') {
        positionsData.push({
          positionName: nameInput.value.trim(),
          personnel: personnelInput.value.trim()
        });
      }
    });

    const saveBtn = event.target;
    saveBtn.disabled = true; 
    saveBtn.innerText = "儲存中...";

    try {
      const result = await callAPI('savePositions', { positionsData: positionsData });
      if (result.status === 'success') {
        alert("設定已成功儲存！");
      } else {
        alert("儲存失敗：" + result.message);
      }
    } catch (error) {
      alert("儲存發生錯誤！");
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerText = "儲存設定";
    }
  }

  // ==========================================
  // 服事安排 (Schedule Tab) 相關邏輯
  // ==========================================

  let currentPositions = []; 
  let generatedScheduleData = []; 
  let fpInstance = null; // 儲存日曆實體

  async function initScheduleTab() {
    // 1. 初始化 Flatpickr 日曆 (多選模式、繁體中文)
    if (!fpInstance) {
      fpInstance = flatpickr("#multiDatePicker", {
        mode: "multiple",
        dateFormat: "Y-m-d",
        locale: "zh"
      });
    }

    // 2. 取得後端人員名單
    try {
      const result = await callAPI('getPositions', {});
      if (result.status === 'success') {
        currentPositions = result.data;
      }
    } catch (error) {
      console.error("無法取得位置清單：", error);
    }
  }

  // 處理點擊「確認新增」按鈕
  function addSelectedDates() {
    if (!fpInstance) return;
    
    const selectedDates = fpInstance.selectedDates;
    
    if (selectedDates.length === 0) {
      alert("請先在日曆上點選至少一個日期！");
      return;
    }

    // 排序日期
    selectedDates.sort((a, b) => a - b);

    // 迴圈新增設定列
    selectedDates.forEach(dateObj => {
      const dateString = flatpickr.formatDate(dateObj, "Y-m-d");
      addScheduleDateRow(dateString);
    });

    // 清空日曆選取狀態
    fpInstance.clear();
  }

  // 修改：帶入預設日期，並將聚會預設為「主日」
  function addScheduleDateRow(dateVal = '') {
    const container = document.getElementById('dateSettingsContainer');
    const div = document.createElement('div');
    div.className = 'card mb-2 p-2 schedule-date-row border-primary border-opacity-25';
    
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-1">
        <input type="date" class="form-control form-control-sm s-date w-50 me-1" value="${dateVal}" required>
        <select class="form-select form-select-sm s-type w-50 text-primary fw-bold">
          <option value="主日" selected>主日</option>
          <option value="青年聚會">青年聚會</option>
          <option value="禱告會">禱告會</option>
        </select>
        <button class="btn btn-sm btn-outline-danger ms-1" onclick="this.closest('.schedule-date-row').remove()">x</button>
      </div>
      <input type="text" class="form-control form-control-sm s-leave" placeholder="請假人員 (如: 王小明,李大華)">
    `;
    container.appendChild(div);
  }

  function getQuarter(dateString) {
    const d = new Date(dateString);
    const q = Math.floor((d.getMonth() + 3) / 3);
    return `Q${q}`;
  }

  function generateSchedule() {
    if (currentPositions.length === 0) {
      alert("請先至「位置設定與人員」建立資料！");
      return;
    }

    const rows = document.querySelectorAll('.schedule-date-row');
    let inputConditions = [];
    rows.forEach(row => {
      const dateVal = row.querySelector('.s-date').value;
      const typeVal = row.querySelector('.s-type').value;
      const leaveVal = row.querySelector('.s-leave').value;
      if (dateVal) {
        inputConditions.push({
          date: dateVal,
          type: typeVal,
          leaves: leaveVal.split(',').map(s => s.trim()).filter(s => s !== '') 
        });
      }
    });

    if (inputConditions.length === 0) {
      alert("請至少設定一天的聚會日期！"); return;
    }

    inputConditions.sort((a, b) => a.date.localeCompare(b.date));

    let consecutiveCount = {}; 
    currentPositions.forEach(p => { consecutiveCount[p.positionName] = {}; });
    
    let previousLeader = null; 
    generatedScheduleData = [];

    inputConditions.forEach(dayInfo => {
      let dailyRecord = {
        '年度': dayInfo.date.substring(0, 4),
        '季度': getQuarter(dayInfo.date),
        '日期': dayInfo.date,
        '聚會類別': dayInfo.type
      };
      
      let assignedToday = []; 

      currentPositions.forEach(posObj => {
        let posName = posObj.positionName;
        let candidates = posObj.personnel.split(',').map(s => s.trim()).filter(s => s !== '');

        let validCandidates = candidates.filter(person => {
          if (dayInfo.leaves.includes(person)) return false; 
          if (assignedToday.includes(person)) return false;  
          if (posName === '主領' && person === previousLeader) return false; 
          if ((consecutiveCount[posName][person] || 0) >= 2) return false;   
          return true; 
        });

        let selectedPerson = "";
        if (validCandidates.length > 0) {
          let randomIndex = Math.floor(Math.random() * validCandidates.length);
          selectedPerson = validCandidates[randomIndex];
        }

        dailyRecord[posName] = selectedPerson;
        if (selectedPerson) {
          assignedToday.push(selectedPerson);
        }

        candidates.forEach(person => {
          if (person === selectedPerson) {
            consecutiveCount[posName][person] = (consecutiveCount[posName][person] || 0) + 1;
          } else {
            consecutiveCount[posName][person] = 0;
          }
        });
      }); 

      previousLeader = dailyRecord['主領'];
      generatedScheduleData.push(dailyRecord);
    }); 

    renderPreviewTable(generatedScheduleData);
  }

  function renderPreviewTable(data) {
    const thead = document.getElementById('previewThead');
    const tbody = document.getElementById('previewTbody');
    const table = document.getElementById('previewTable');
    const placeholder = document.getElementById('previewPlaceholder');
    const saveBtn = document.getElementById('saveScheduleBtn');

    thead.innerHTML = ''; tbody.innerHTML = '';

    let headers = ['日期', '聚會類別', ...currentPositions.map(p => p.positionName)];
    let trHead = document.createElement('tr');
    headers.forEach(h => {
      let th = document.createElement('th');
      th.innerText = h;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);

    data.forEach((row, rowIndex) => {
      let tr = document.createElement('tr');
      headers.forEach(h => {
        let td = document.createElement('td');
        if (h === '日期' || h === '聚會類別') {
          td.innerText = row[h]; 
        } else {
          let input = document.createElement('input');
          input.type = 'text';
          input.className = 'form-control form-control-sm';
          input.style.minWidth = '70px';
          input.value = row[h] || '';
          input.onchange = (e) => { generatedScheduleData[rowIndex][h] = e.target.value.trim(); };
          td.appendChild(input);
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    placeholder.style.display = 'none';
    table.style.display = 'table';
    saveBtn.style.display = 'inline-block';
  }

  async function saveGeneratedSchedule() {
    if (generatedScheduleData.length === 0) return;

    const btn = document.getElementById('saveScheduleBtn');
    btn.disabled = true; btn.innerText = '儲存中...';

    try {
      const result = await callAPI('saveSchedule', { scheduleData: generatedScheduleData });
      if (result.status === 'success') {
        alert("🎉 排班表已成功儲存！");
      } else {
        alert("儲存失敗：" + result.message);
      }
    } catch (error) {
      alert("網路連線錯誤！");
    } finally {
      btn.disabled = false; btn.innerText = '儲存至資料庫';
    }
  }

  // ==========================================
  // 牧師與題目與經文設定 (Sermon Tab) 相關邏輯
  // ==========================================

  function initSpreadsheet() {
    window.xs = x_spreadsheet('#x-spreadsheet-demo', {
      showToolbar: true,
      showGrid: true,
      view: {
        height: () => 400,
        width: () => document.getElementById('sermon').clientWidth - 30, 
      }
    });
    xs.loadData([{
      name: '講員排程',
      rows: {
        0: { cells: { 0: {text: '日期'}, 1: {text: '牧師'}, 2: {text: '題目'}, 3: {text: '經文'} } }
      }
    }]);
  }

  function saveSermonData() {
    alert("準備儲存牧師與經文資料...");
  }
</script>
</body>
</html>
