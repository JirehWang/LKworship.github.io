<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>敬拜團服事排班系統 - 管理後台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</head>
<body>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold mb-0">敬拜團服事管理系統 <span class="badge bg-dark fs-6 ms-2">Pro</span></h2>
    <span class="text-muted small">最後同步：<span id="syncTime">--:--</span></span>
  </div>
  
  <ul class="nav nav-pills mb-4 shadow-sm p-2 rounded-pill bg-light" id="myTab">
    <li class="nav-item"><a class="nav-link active rounded-pill fw-bold" href="#" onclick="switchTab('dashboard')">📢 公佈欄總表</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="#" onclick="switchTab('settings')">⚙️ 位置與同工</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="#" onclick="switchTab('schedule')">🗓️ 服事安排預覽</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="Worship_songs.html">🎵 敬拜曲目</a></li>
  </ul>

  <div id="dashboard" class="tab-content active">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold text-dark mb-0">季度服事表</h5>
      <div class="d-flex align-items-center">
        <label class="form-label me-2 mb-0 fw-bold">選擇季度：</label>
        <select id="quarterSelect" class="form-select w-auto" onchange="loadDashboard()">
          <option value="2026-Q1" selected>2026-Q1</option>
          <option value="2026-Q2">2026-Q2</option>
          <option value="2026-Q3">2026-Q3</option>
          <option value="2026-Q4">2026-Q4</option>
        </select>
      </div>
    </div>
    <div class="table-scroll-container" id="dashboardContainer">
      <div class="text-center text-muted p-5">請選擇季度以載入資料...</div>
    </div> 
  </div>

  <div id="settings" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold">位置與同工名單設定</h5>
      <button class="btn btn-primary px-4 fw-bold" onclick="savePositionsToServer()">儲存設定</button>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered align-middle table-hover">
        <thead class="table-light text-center">
          <tr><th style="width: 50px;">↕️</th><th style="width: 20%;">位置名稱</th><th style="width: 50%;">同工名單</th><th style="width: 15%;">是否必排</th><th style="width: 80px;">操作</th></tr>
        </thead>
        <tbody id="positionsTbody"></tbody>
      </table>
    </div>
    <button class="btn btn-outline-secondary w-100 fw-bold" onclick="addPositionRow('', '', '是')">+ 新增一個位置</button>
  </div>

  <div id="schedule" class="tab-content">
    <div class="card p-3 mb-3 shadow-sm bg-light border-0">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-lg-auto">
          <div class="input-group input-group-sm">
            <span class="input-group-text fw-bold bg-white text-success">季度讀取</span>
            <select id="editQuarterSelect" class="form-select text-center" style="min-width: 100px;">
              <option value="2026-Q1">2026-Q1</option>
              <option value="2026-Q2" selected>2026-Q2</option>
              <option value="2026-Q3">2026-Q3</option>
              <option value="2026-Q4">2026-Q4</option>
            </select>
            <button class="btn btn-outline-success fw-bold px-3" onclick="loadScheduleByQuarter()">讀取服事表</button>
          </div>
        </div>
        <div class="col-12 col-lg-auto">
          <div class="input-group input-group-sm">
            <span class="input-group-text fw-bold bg-white text-primary">區間讀取</span>
            <input type="date" id="queryStartDate" class="form-control">
            <span class="input-group-text bg-light">至</span>
            <input type="date" id="queryEndDate" class="form-control">
            <button class="btn btn-outline-primary fw-bold px-3" onclick="loadScheduleByDateRange()">讀取</button>
          </div>
        </div>
        
        <div class="col-12 col-lg-auto ms-lg-auto d-flex gap-2 flex-wrap">
          <button class="btn btn-outline-dark fw-bold shadow-sm" onclick="openAddExtraModal()">➕ 新增額外聚會</button>
          <button class="btn btn-danger fw-bold shadow-sm px-4" onclick="smartGenerateSchedule()">✨ 智慧產生班表</button>
          <button class="btn btn-success fw-bold shadow-sm" id="saveScheduleBtn" onclick="saveGeneratedSchedule()" style="display: none;">💾 儲存並發佈</button>
        </div>
      </div>
    </div>

    <div class="table-scroll-container bg-white border rounded-3 shadow-sm" id="previewContainer" style="display: none;">
      <table class="modern-table w-100">
        <thead id="previewThead"></thead>
        <tbody id="previewTbody"></tbody>
      </table>
    </div>
    
    <div id="previewPlaceholder" class="text-center text-muted mt-2 p-5 bg-light rounded-3 border">
      <h5 class="text-secondary fw-bold mb-3">請點擊上方「讀取框架」載入外部聚會日期</h5>
      <p class="small mb-0">載入後，您可以設定請假，並點擊「✨ 智慧產生班表」讓系統自動填空。</p>
    </div>
  </div>
</div>

<div class="modal fade" id="leaveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold">設定請假人員</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="leaveModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary fw-bold" onclick="confirmLeaveSelection()">確認儲存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="extraMeetingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title fw-bold">➕ 新增額外聚會</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <div class="mb-3">
          <label class="form-label fw-bold">聚會日期</label>
          <input type="date" id="extraDate" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">聚會名稱 (選填)</label>
          <input type="text" id="extraName" class="form-control" placeholder="例如：特別祈禱會">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">聚會類別</label>
          <input type="text" id="extraType" class="form-control" placeholder="例如：特會" value="特會">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light border fw-bold" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-dark fw-bold px-4 shadow-sm" onclick="confirmAddExtraMeeting()">確認新增</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script> 
<script src="https://jirehwang.github.io/LKERP.github.io/config.js"></script>  
<script src="script.js"></script>
</body>
</html>
