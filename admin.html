<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>敬拜團服事排班系統 - 管理後台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold mb-0">敬拜團服事管理系統 <span class="badge bg-dark fs-6 ms-2">Pro</span></h2>
    <span class="text-muted small">最後同步：<span id="syncTime">--:--</span></span>
  </div>
  
  <ul class="nav nav-pills mb-4 shadow-sm p-2 rounded-pill bg-light" id="myTab">
    <li class="nav-item"><a class="nav-link active rounded-pill fw-bold" href="#" onclick="switchTab('dashboard')">📢 公佈欄總表</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="#" onclick="switchTab('settings')">⚙️ 位置與人員</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="#" onclick="switchTab('schedule')">🗓️ 服事安排預覽</a></li>
    <li class="nav-item"><a class="nav-link rounded-pill fw-bold" href="#" onclick="switchTab('sermon')">📖 牧師題目快速登錄</a></li>
  </ul>

  <div id="dashboard" class="tab-content active">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold text-dark mb-0">季度服事表</h5>
      <div class="d-flex align-items-center">
        <label class="form-label me-2 mb-0 fw-bold">選擇季度：</label>
        <select id="quarterSelect" class="form-select w-auto" onchange="loadDashboard()">
          <option value="2026-Q1" selected>2026-Q1</option>
          <option value="2026-Q2">2026-Q2</option>
          <option value="2026-Q3">2026-Q3</option>
          <option value="2026-Q4">2026-Q4</option>
        </select>
      </div>
    </div>
    <div class="alert alert-light border border-warning border-opacity-50">
      💡 若出現 <span class="badge bg-warning text-dark">⚠️ 警告</span> 標記，代表該日排班有違規情況。
    </div>
    <div class="table-scroll-container" id="dashboardContainer">
      <div class="text-center text-muted p-5">請選擇季度以載入資料...</div>
    </div> 
  </div>

  <div id="settings" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold">位置與候選名單設定</h5>
      <button class="btn btn-primary px-4 fw-bold" onclick="savePositionsToServer()">儲存設定</button>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered align-middle table-hover">
        <thead class="table-light text-center">
          <tr><th style="width: 50px;">↕️</th><th style="width: 20%;">位置名稱</th><th style="width: 50%;">人員名單</th><th style="width: 15%;">是否必排</th><th style="width: 80px;">操作</th></tr>
        </thead>
        <tbody id="positionsTbody"></tbody>
      </table>
    </div>
    <button class="btn btn-outline-secondary w-100 fw-bold" onclick="addPositionRow('', '', '是')">+ 新增一個位置</button>
  </div>

  <div id="schedule" class="tab-content">
    <div class="row">
      <div class="col-md-3">
        <div class="card p-3 border-0 bg-light mb-3 shadow-sm">
          <label class="fw-bold text-primary mb-2">1. 產生全新排班</label>
          <input type="text" id="multiDatePicker" class="form-control mb-2 bg-white" placeholder="點此打開日曆多選...">
          <button class="btn btn-sm btn-primary w-100 fw-bold" onclick="addSelectedDates()">確認新增日期</button>
          <div id="dateSettingsContainer" class="mt-3" style="max-height: 350px; overflow-y: auto;"></div>
          <button class="btn btn-danger w-100 mt-3 fw-bold" onclick="generateSchedule()">產生排班預覽 🚀</button>
        </div>
        <div class="card p-3 border-0 bg-success bg-opacity-10 shadow-sm">
          <label class="fw-bold text-success mb-2">2. 讀取現有排班</label>
          <input type="date" id="editStartDate" class="form-control form-control-sm mb-1">
          <input type="date" id="editEndDate" class="form-control form-control-sm mb-2">
          <button class="btn btn-sm btn-success w-100 fw-bold" onclick="loadExistingSchedule()">讀取資料 📥</button>
        </div>
      </div>
      <div class="col-md-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold text-primary mb-0">排班預覽編輯</h5>
          <button class="btn btn-success fw-bold px-4 shadow-sm" id="saveScheduleBtn" onclick="saveGeneratedSchedule()" style="display: none;">儲存並發佈</button>
        </div>
        <div class="table-scroll-container" id="previewContainer" style="display: none;">
          <table class="modern-table"><thead id="previewThead"></thead><tbody id="previewTbody"></tbody></table>
        </div>
        <div id="previewPlaceholder" class="text-center text-muted mt-4 p-5 bg-light rounded-3 border">
          <h5 class="text-secondary">請先在左側設定條件並產生預覽</h5>
        </div>
      </div>
    </div>
  </div>

  <div id="sermon" class="tab-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold">📖 牧師、題目與經文快速登錄</h5>
      <div>
        <button class="btn btn-primary fw-bold px-3 me-2" onclick="smartProcessSermon()" id="aiBtn">✨ 智慧處理 (Excel / AI)</button>
        <button class="btn btn-success fw-bold px-4" onclick="saveSermonData()">儲存至資料庫</button>
      </div>
    </div>
    
    <div class="alert alert-info shadow-sm border-0 small">
      💡 <strong>無痛貼上：</strong>不管是在手機還是電腦，直接把 <strong>Excel 表格</strong> 或長篇 <strong>Line 訊息</strong> 整坨貼進來，點擊上方「智慧處理」按鈕，系統會自動判斷！
    </div>

    <textarea id="sermonPasteArea" class="form-control mb-3 border-primary bg-light shadow-sm" rows="8" placeholder="📋 點此貼上文字，不限行數..."></textarea>
    
    <div class="table-responsive bg-white rounded-3 shadow-sm border mb-3">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-dark text-center">
          <tr>
            <th style="width: 15%">日期</th>
            <th style="width: 15%">聚會類型</th>
            <th style="width: 15%">牧師</th>
            <th style="width: 30%">題目</th>
            <th style="width: 20%">經文</th>
            <th style="width: 5%">操作</th>
          </tr>
        </thead>
        <tbody id="sermonTbody"></tbody>
      </table>
    </div>
    <button class="btn btn-outline-secondary w-100 fw-bold" onclick="addSermonRow('', '', '主日', '', '', '')">+ 手動新增一列</button>
  </div>
</div>

<div class="modal fade" id="leaveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold">選擇請假人員 <span id="leaveModalDate" class="text-primary ms-2 fs-6"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="leaveModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary fw-bold" onclick="confirmLeaveSelection()">確認儲存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script> 
<script src="script.js"></script>
</body>
</html>
