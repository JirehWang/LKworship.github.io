<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>敬拜曲目管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 頁面專屬樣式 */
    .songs-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .songs-header h2 { margin: 0; font-size: 1.4rem; }
    .songs-header .subtitle { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

    .query-bar {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    /* 曲目表格 */
    .songs-table { width: 100%; border-collapse: collapse; }
    .songs-table th {
      background: #2c3e50;
      color: white;
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
      font-size: 0.9rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .songs-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
      text-align: center;
      font-size: 0.92rem;
    }
    .songs-table tr:hover td { background: #f8f9fa; }

    /* 曲目欄位 */
    .songs-cell { text-align: left !important; min-width: 280px; }
    .songs-display {
      color: #2c3e50;
      line-height: 1.7;
      font-size: 0.9rem;
      padding: 4px 6px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .songs-display .song-item {
      display: inline-block;
      background: #e8f4fd;
      color: #1565c0;
      border-radius: 4px;
      padding: 2px 8px;
      margin: 2px 3px;
      font-size: 0.85rem;
    }
    .songs-display.empty { color: #adb5bd; font-style: italic; }

    .songs-input {
      width: 100%;
      min-height: 70px;
      border: 2px solid #4a90d9;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
      outline: none;
    }
    .songs-input:focus { border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }

    /* 按鈕 */
    .btn-edit-row {
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 6px;
    }
    .btn-save-row {
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 6px;
    }
    .btn-cancel-row {
      font-size: 0.78rem;
      padding: 4px 8px;
      border-radius: 6px;
    }

    /* 主領徽章 */
    .leader-badge {
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.85rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .leader-badge.empty { background: #f5f5f5; color: #aaa; font-weight: normal; }

    /* 日期 */
    .date-cell { white-space: nowrap; font-weight: bold; font-size: 0.88rem; }
    .meeting-name { color: #0d6efd; font-size: 0.85rem; }
    .meeting-type { color: #6c757d; font-size: 0.78rem; }

    /* 儲存全部按鈕 */
    #saveAllBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      border-radius: 50px;
      padding: 12px 24px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      display: none;
    }

    .table-scroll-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #dee2e6;
      background: white;
      -webkit-overflow-scrolling: touch;
    }

    .hint-text {
      font-size: 0.78rem;
      color: #6c757d;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container py-4">

  <!-- 頁首 -->
  <div class="songs-header">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h2>🎵 敬拜曲目管理</h2>
        <div class="subtitle">每場聚會的敬拜詩歌清單</div>
      </div>
      <a href="admin.html" class="btn btn-outline-light btn-sm">← 返回管理後台</a>
    </div>
  </div>

  <!-- 查詢列 -->
  <div class="query-bar">
    <div class="row g-2 align-items-center">
      <!-- 季度查詢 -->
      <div class="col-12 col-md-auto">
        <div class="input-group input-group-sm">
          <span class="input-group-text fw-bold bg-white text-success">季度</span>
          <select id="quarterSelect" class="form-select" style="min-width:100px;">
            <option value="2026-Q1">2026-Q1</option>
            <option value="2026-Q2" selected>2026-Q2</option>
            <option value="2026-Q3">2026-Q3</option>
            <option value="2026-Q4">2026-Q4</option>
          </select>
          <button class="btn btn-outline-success fw-bold px-3" onclick="loadByQuarter()">讀取</button>
        </div>
      </div>
      <!-- 區間查詢 -->
      <div class="col-12 col-md-auto">
        <div class="input-group input-group-sm">
          <span class="input-group-text fw-bold bg-white text-primary">區間</span>
          <input type="date" id="startDate" class="form-control">
          <span class="input-group-text bg-light">至</span>
          <input type="date" id="endDate" class="form-control">
          <button class="btn btn-outline-primary fw-bold px-3" onclick="loadByDateRange()">讀取</button>
        </div>
      </div>
      <div class="col-12 col-md-auto ms-md-auto">
        <span class="text-muted small">最後同步：<span id="syncTime">--:--</span></span>
      </div>
    </div>
  </div>

  <!-- 表格容器 -->
  <div class="table-scroll-wrapper" id="tableWrapper" style="display:none;">
    <table class="songs-table" id="songsTable">
      <thead>
        <tr>
          <th style="min-width:110px;">日期</th>
          <th style="min-width:150px;">聚會名稱</th>
          <th style="min-width:90px;">類別</th>
          <th style="min-width:90px;">主領</th>
          <th style="min-width:300px;">敬拜曲目</th>
          <th style="min-width:100px;">操作</th>
        </tr>
      </thead>
      <tbody id="songsTbody"></tbody>
    </table>
  </div>

  <!-- 空白提示 -->
  <div id="placeholder" class="text-center text-muted p-5 bg-light rounded-3 border">
    <h5 class="text-secondary fw-bold mb-2">🎵 請選擇季度或日期區間來載入聚會</h5>
    <p class="small mb-0">載入後點擊各列的「編輯」按鈕即可填入曲目</p>
  </div>

</div>

<!-- 固定儲存按鈕 -->
<button class="btn btn-success" id="saveAllBtn" onclick="saveAllSongs()">
  💾 儲存所有曲目
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://jirehwang.github.io/LKERP.github.io/config.js"></script>
<script src="worship_songs.js"></script>
</body>
</html>
